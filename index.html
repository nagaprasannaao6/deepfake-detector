<!DOCTYPE html>
<html>
<head>
<title>Deepfake Detector</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

.card {
    background:#1e293b;
    padding:20px;
    margin:20px;
    border-radius:10px;
}

button {
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

.hidden { display:none; }

.tabs div {
    display:inline-block;
    padding:10px;
    cursor:pointer;
    border-radius:6px;
}

.tabs div.active {
    background:#38bdf8;
    color:black;
    font-weight:bold;
}

.loader {
    margin-top: 10px;
    color:#38bdf8;
    font-weight: bold;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

.info-box {
    background:#020617;
    padding:10px;
    margin-top:15px;
    border-radius:8px;
    font-size:14px;
    color:#cbd5f5;
}
</style>
</head>

<body>

<h1>Deepfake Detection System</h1>

<div class="tabs">
<div onclick="showTab('audio', this)" class="active">Audio</div>
<div onclick="showTab('video', this)">Video</div>
<div onclick="showTab('sync', this)">AV Sync</div>
</div>

<!-- AUDIO -->
<div id="audioTab" class="card">
<input type="file" id="audioFile">
<button onclick="audio()">Analyze</button>

<div id="audioLoader" class="hidden loader">⏳ Analyzing audio...</div>

<div id="aResult"></div>

<div class="info-box">
📊 Graph shows audio energy (RMS) over time.<br>
Higher variation → natural speech<br>
Flat pattern → possible AI-generated audio
</div>

<canvas id="chart"></canvas>
</div>

<!-- VIDEO -->
<div id="videoTab" class="card hidden">
<input type="file" id="videoFile">
<button onclick="video()">Analyze</button>

<div id="videoLoader" class="hidden loader">⏳ Analyzing video...</div>

<div id="vResult"></div>
</div>

<!-- SYNC -->
<div id="syncTab" class="card hidden">
<input type="file" id="syncFile">
<button onclick="sync()">Analyze</button>

<div id="syncLoader" class="hidden loader">⏳ Checking AV sync...</div>

<div id="sResult"></div>
</div>

<script>
let chart;

function showTab(tab, el){
    document.getElementById("audioTab").classList.add("hidden");
    document.getElementById("videoTab").classList.add("hidden");
    document.getElementById("syncTab").classList.add("hidden");

    document.getElementById(tab+"Tab").classList.remove("hidden");

    document.querySelectorAll(".tabs div").forEach(btn => btn.classList.remove("active"));
    el.classList.add("active");
}

// AUDIO
async function audio(){
let file=document.getElementById("audioFile").files[0];
if(!file) return alert("Upload file");

document.getElementById("audioLoader").classList.remove("hidden");

let f=new FormData();
f.append("audio",file);

let r=await fetch("/detect-audio",{method:"POST",body:f});
let d=await r.json();

document.getElementById("audioLoader").classList.add("hidden");

// RESULT
document.getElementById("aResult").innerHTML = `
<b>Result:</b> ${d.result} <br>
<b>Confidence:</b> ${(d.confidence*100).toFixed(2)}% <br>
<b>Variance:</b> ${d.variance?.toFixed(2) || "N/A"} <br>
<b>Temporal Var:</b> ${d.temporal_variance?.toFixed(4) || "N/A"} <br>
<b>ZCR:</b> ${d.zcr?.toFixed(4) || "N/A"} <br>
<b>MFCC Var:</b> ${d.mfcc_variance?.toFixed(2) || "N/A"}
`;

// GRAPH
if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:d.time_series.map((_,i)=>i),
datasets:[
{
label:"Audio Energy",
data:d.time_series,
borderWidth:2
},
{
label:"Reference (Flat AI)",
data:d.time_series.map(()=>0.02),
borderDash:[5,5]
}
]
}
});
}

// VIDEO
async function video(){
let file=document.getElementById("videoFile").files[0];
if(!file) return alert("Upload file");

document.getElementById("videoLoader").classList.remove("hidden");

let f=new FormData();
f.append("video",file);

let r=await fetch("/detect-video",{method:"POST",body:f});
let d=await r.json();

document.getElementById("videoLoader").classList.add("hidden");

document.getElementById("vResult").innerHTML = `
<b>Result:</b> ${d.result} <br>
<b>Confidence:</b> ${(d.confidence*100).toFixed(2)}% <br>
<b>Motion Variance:</b> ${d.motion_variance?.toFixed(2) || "N/A"} <br>
<b>Face Ratio:</b> ${d.face_ratio?.toFixed(2) || "N/A"}
`;
}

// SYNC
async function sync(){
let file=document.getElementById("syncFile").files[0];
if(!file) return alert("Upload file");

document.getElementById("syncLoader").classList.remove("hidden");

let f=new FormData();
f.append("video",file);

let r=await fetch("/detect-sync",{method:"POST",body:f});
let d=await r.json();

document.getElementById("syncLoader").classList.add("hidden");

document.getElementById("sResult").innerHTML = `
<b>Result:</b> ${d.result} <br>
<b>Confidence:</b> ${(d.confidence*100).toFixed(2)}% <br>
<b>Correlation:</b> ${d.correlation.toFixed(3)} <br>
<b>Interpretation:</b> ${
    d.correlation > 0.5 ? "Strong sync between audio & motion" :
    d.correlation > 0.2 ? "Partial sync detected" :
    "Audio and video are mismatched"
}
`;
}
</script>

</body>
</html>
